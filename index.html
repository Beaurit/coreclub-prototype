<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코어클럽 수업 선택 프로토타입</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container {
    max-width: 500px;
    width: 100%;
  }
  h1 {
    font-size: 24px;
    font-weight: 800;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: #888;
    margin-bottom: 36px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    text-decoration: none;
    display: block;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .card:active { transform: scale(0.98); }
  .card:hover { border-color: #2D2D2D; }
  .card .label {
    font-size: 13px;
    font-weight: 700;
    color: #999;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .card .name {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .card .desc {
    font-size: 14px;
    color: #666;
    line-height: 1.5;
  }
  .card .tag {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 12px;
    background: #f5f5f5;
    border-radius: 8px;
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>
<div class="container">
  <h1>코어클럽 수업 선택 프로토타입</h1>
  <p class="subtitle">3가지 옵션을 클릭해서 테스트해보세요</p>

  <a class="card" href="option-a.html">
    <div class="label">OPTION A</div>
    <div class="name">2단계 순차 선택</div>
    <div class="desc">난이도 먼저 선택 → 시간 선택<br>한 화면에 하나의 선택만</div>
    <span class="tag">STEP 1/2 방식</span>
  </a>

  <a class="card" href="option-b.html">
    <div class="label">OPTION B</div>
    <div class="name">한 페이지 통합</div>
    <div class="desc">난이도 + 시간을 한 화면에서 끝<br>스크롤 한 번이면 완료</div>
    <span class="tag">원페이지 방식</span>
  </a>

  <a class="card" href="option-c.html">
    <div class="label">OPTION C</div>
    <div class="name">추천형</div>
    <div class="desc">질문에 답하면 난이도 추천<br>"나에게 맞는 수업 찾기"</div>
    <span class="tag">가이드 방식</span>
  </a>
</div>
</body>
</html>
